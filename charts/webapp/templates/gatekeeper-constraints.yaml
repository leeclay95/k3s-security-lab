{{- if .Values.gatekeeper.enabled }}
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockPrivileged
metadata:
  name: block-privileged-containers
  annotations:
    # Argo CD: applied in wave 1, after the ConstraintTemplates (wave 0) have
    # registered their CRDs (Argo gates on ConstraintTemplate health between waves).
    argocd.argoproj.io/sync-wave: "1"
{{- if .Values.gatekeeper.helmHooks }}
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
{{- end }}
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces:
      - {{ .Release.Namespace }}
---
