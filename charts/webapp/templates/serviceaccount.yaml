apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "webapp.name" . }}-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
automountServiceAccountToken: false         # no API token injected — nginx has no reason to call K8s API
---
# Zero-permission Role — nginx serves static content and needs no API access.
# This replaces the original ClusterRoleBinding to cluster-admin (INSECURE).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "webapp.name" . }}-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "webapp.name" . }}-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "webapp.name" . }}-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: {{ include "webapp.name" . }}-role
