apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "webapp.name" . }}-index-html
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
data:
  # Git-declared page. Argo CD keeps the live webapp serving exactly this;
  # any out-of-band change (e.g. mounting a different page) is reverted.
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Approved Deployment</title>
      <style>
        html { color-scheme: light dark; }
        body { font-family: system-ui, Tahoma, Verdana, Arial, sans-serif;
        text-align: center; margin-top: 8em; background: #0b3d0b; color: #eafbe7; }
        .tag { font-size: .8em; letter-spacing: .3em; color: #7CFC00; }
        h1 { margin: .3em 0; }
        code { background: rgba(255,255,255,.1); padding: .1em .4em; border-radius: 4px; }
      </style>
    </head>
    <body>
      <div class="tag">&#9989; TESTING &mdash; APPROVED DEPLOYMENT</div>
      <h1>Deployment approved and live via GitOps</h1>
      <p>This page is served from Git &rarr; Argo CD &rarr; nginx.</p>
      <p>Source of truth: <code>charts/webapp/templates/configmap-index.yaml</code></p>
    </body>
    </html>
