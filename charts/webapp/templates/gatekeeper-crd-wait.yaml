{{- if .Values.gatekeeper.enabled }}
# Gatekeeper dynamically provisions a CRD per ConstraintTemplate (hook weight 0).
# That provisioning — and, on upgrade, the delete-then-recreate of the CRD when
# the ConstraintTemplate is re-applied — is asynchronous. Without a pause here,
# the Constraint hook (weight 5) can fire while the CRD is still "Terminating",
# and the API server rejects the create. This mirrors the fixed 10s
# time_sleep.crds_ready wait used before Gatekeeper policies moved into this chart.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "webapp.name" . }}-gatekeeper-crd-wait
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "webapp.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: wait
          image: busybox:1.36
          command: ["sleep", "10"]
{{- end }}
