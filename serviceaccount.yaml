apiVersion: v1
kind: ServiceAccount
metadata:
  name: webapp-sa
  namespace: webapp
automountServiceAccountToken: false         # was: missing (INSECURE — default is true)
---
# was: ClusterRoleBinding to cluster-admin (INSECURE — full cluster access)
# Replaced with a namespace-scoped Role with zero permissions (nginx serves static content)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: webapp-role
  namespace: webapp
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: webapp-rolebinding
  namespace: webapp
subjects:
  - kind: ServiceAccount
    name: webapp-sa
    namespace: webapp
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: webapp-role
