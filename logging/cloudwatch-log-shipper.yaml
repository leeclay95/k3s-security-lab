# Ships node logs into floci CloudWatch Logs so the groups provisioned by
# terraform/infra actually fill up. A hardened aws-cli DaemonSet that tails the
# node's log files and PutLogEvents them to floci at host.k3d.internal:4566.
#
# Three streams:
#   /var/log/pods/webapp_*/*/*.log  -> /k8s/webapp/app    (nginx access/error)
#   /var/log/k3s-audit.log          -> /k8s/webapp/audit  (API-server audit:
#                                       exec/attach, restarts, deploys, secret
#                                       access, RBAC, webapp pod events)
#   /var/log/pods/falco_*/falco/*.log -> /k8s/falco       (Falco runtime alerts:
#                                       shell-in-container, exec, sensitive reads)
#
# Lives in its OWN `logging` namespace on purpose: the webapp-scoped Gatekeeper
# constraints don't apply here, and it's outside the Argo-managed webapp chart.
#
# Runs as root (uid 0). The kube-apiserver writes the audit log 0600 root:root,
# so only root can read it. Still hardened otherwise: drop ALL caps (root reads
# its own 0600 file by ownership, no CAP_DAC_OVERRIDE needed), read-only rootfs,
# no privilege escalation, seccomp RuntimeDefault. hostPath is inherent to any
# node log collector.
#
# Apply:  kubectl --context k3d-webapp-test apply -f logging/cloudwatch-log-shipper.yaml
# Verify: aws --endpoint-url=http://localhost:4566 logs filter-log-events --log-group-name /k8s/webapp/audit
apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudwatch-log-shipper
  namespace: logging
  labels:
    app: cloudwatch-log-shipper
spec:
  selector:
    matchLabels:
      app: cloudwatch-log-shipper
  template:
    metadata:
      labels:
        app: cloudwatch-log-shipper
    spec:
      terminationGracePeriodSeconds: 5
      securityContext:
        runAsUser: 0 # root: the audit log is 0600 root:root, only owner can read it
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - operator: Exists # schedule on every node regardless of taints
      containers:
        - name: shipper
          image: amazon/aws-cli:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -u
              EP="http://host.k3d.internal:4566"
              STREAM="${NODE_NAME:-webapp-node}"
              export HOME=/tmp
              MAX=100       # flush a batch after this many lines
              INTERVAL=5    # ...or after this many seconds, whichever comes first
              # ship <glob-or-file> <log-group>: tail the source and PutLogEvents
              # in BATCHES. The previous version launched one aws CLI (a cold
              # Python interpreter, ~0.2-0.4s CPU) per log line, which pinned the
              # CPU limit once the audit stream was added. Batching cuts that to
              # ~one aws process per MAX lines / INTERVAL seconds.
              ship() {
                local src="$1" grp="$2" buf="" n=0 rc ts ev esc line
                aws --endpoint-url "$EP" --region us-east-1 logs create-log-group  --log-group-name "$grp" 2>/dev/null || true
                aws --endpoint-url "$EP" --region us-east-1 logs create-log-stream --log-group-name "$grp" --log-stream-name "$STREAM" 2>/dev/null || true
                echo "shipping $src -> $grp (stream $STREAM); batched <=$MAX lines / ${INTERVAL}s"
                flush() {
                  [ "$n" -eq 0 ] && return
                  aws --endpoint-url "$EP" --region us-east-1 logs put-log-events --log-group-name "$grp" --log-stream-name "$STREAM" --log-events "[$buf]" >/dev/null 2>&1 || true
                  buf=""; n=0
                }
                while true; do
                  if IFS= read -r -t "$INTERVAL" line; then
                    [ -z "$line" ] && continue
                    printf -v ts '%(%s)T' -1; ts="${ts}000"
                    esc="${line//\\/\\\\}"; esc="${esc//\"/\\\"}"; esc="${esc//$'\t'/ }"
                    ev="{\"timestamp\":${ts},\"message\":\"${esc}\"}"
                    if [ "$n" -gt 0 ]; then buf="${buf},${ev}"; else buf="$ev"; fi
                    n=$((n + 1))
                    [ "$n" -ge "$MAX" ] && flush
                  else
                    rc=$?
                    flush                          # timeout or EOF -> send what we have
                    [ "$rc" -le 128 ] && break     # rc<=128 = EOF (tail exited); >128 = read timeout, keep going
                  fi
                done < <(tail -q -n 0 -F $src 2>/dev/null)
              }
              ship "/var/log/pods/webapp_*/*/*.log" "/k8s/webapp/app" &
              ship "/var/log/k3s-audit.log" "/k8s/webapp/audit" &
              ship "/var/log/pods/falco_*/falco/*.log" "/k8s/falco" &
              wait
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 512Mi
          volumeMounts:
            - name: var-log
              mountPath: /var/log
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: var-log
          hostPath:
            path: /var/log
            type: Directory
        - name: tmp
          emptyDir: {}
